# Infrastructure configuration for components that will be deployed to the recidiviz-staging

import:
  - ../catalogs/terraform-backend # Import Terraform backend configuration
  - ../catalogs/organization-settings # Import billing_account and organization_id `settings.context`

settings:
  context:
    project_id: recidiviz-staging

# The variables set here are automatically provided to any components used in this stack.
vars:
  project_id: "{{ .settings.context.project_id }}"

components:
  terraform:
    vendor/cloud-storage-bucket:
      vars:
        location: us-central1
        prefix: "{{ .settings.context.project_id }}"
        names:
          # Shared bucket for files that other components upload via Terraform and
          # mount into Cloud Run / GKE workloads (scripts, config blobs, etc.).
          # New buckets get appended to this list as further use cases land.
          - mounted-source-files
        versioning:
          mounted-source-files: true

    dag-triggering:
      vars:
        source_files_bucket_name: !terraform.state vendor/cloud-storage-bucket ".names[""mounted-source-files""]"
        time_zone: America/Los_Angeles
        composer:
          environment: orchestration-v2
          location: us-central1

        dags:
          # Monitoring runs hourly
          hourly_monitoring_dag:
            schedule:
              hourly: "0 * * * *"

          # Calculation runs daily in staging at 6am EST
          calculation_dag:
            schedule:
              daily-3am-pt: "0 3 * * *"

          # SFTP runs every hour at the 45th minute
          sftp_dag:
            schedule:
              hourly: "45 * * * *"

          # Raw data runs at 5 am EST
          raw_data_import_dag:
            config:
              ingest_instance: PRIMARY
            schedule:
              daily-2am-pt: "0 2 * * *"
