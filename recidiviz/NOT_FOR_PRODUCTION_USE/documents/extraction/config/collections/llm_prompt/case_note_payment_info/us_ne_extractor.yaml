# US_NE-specific Payment Extractor
#
# Tuned for Nebraska's PIMS contact dashboard note format.

collection_name: CASE_NOTE_PAYMENT_INFO

description: >
  Payment information extractor tuned for US_NE supervision contact notes.
  Handles Nebraska PIMS-specific terminology and document structure.

input_document_collection_name: US_NE_SUPERVISION_CONTACT_NOTES

llm_provider: vertex_ai
model: gemini-2.5-flash
thinking_budget: 0

prompt_vars:
  state_agency_name: "Nebraska Department of Correctional Services"
  state_specific_context: |
    Nebraska PIMS contact notes may include:
    - Restitution and fine payment information
    - Court costs and fee assessments
    - Supervision fee tracking and compliance
    - Payment plan updates and modifications
  state_specific_fields_example: '(e.g., "Restitution: X")'
