# Extractor Collection: CASE_NOTE_PAYMENT_INFO
#
# Extractors in this collection identify financial payment information
# from case notes.

name: CASE_NOTE_PAYMENT_INFO
minimum_confidence_level: inferred

description: >
  Extract information about a person's financial payment obligations from case
  notes, including fines, restitution, court costs, supervision fees, and other
  payments owed as part of their supervision.

output_schema:
  full_batch_description: >
    An array of objects with payment information from the case note. Each
    element in the array corresponds to a different payment obligation mentioned
    in the note. If no payment information is found, the array will be empty.

  result_level_description: >
    Comprehensive extraction of financial payment information from a case note.

  inferred_fields:
    - name: payments
      type: ARRAY_OF_STRUCT
      description: >
        List of financial payment obligations mentioned in this note. Empty
        array if no payment information is found.
      fields:
        - name: payment_type
          type: ENUM
          description: The type of financial payment obligation.
          values:
            [
              fine,
              restitution,
              court_costs,
              supervision_fee,
              programming_fee,
              drug_testing_fee,
              electronic_monitoring_fee,
              other,
            ]
          required: true
        - name: payment_status
          type: ENUM
          description: >
            The current status of the payment obligation. Use null with
            null_reason='no_info_found' if the obligation exists but the note
            does not provide enough information to determine how much has been
            paid.
          values: [paid, unpaid, partial, waived]
        - name: amount_owed
          type: FLOAT
          description: Numeric amount remaining to be paid (e.g., 500.50). Omit if unknown.
        - name: amount_paid
          type: FLOAT
          description:
            Numeric amount already paid toward the obligation (e.g., 200.00).
            Omit if unknown.
        - name: payment_plan_amount
          type: FLOAT
          description:
            Numeric installment amount per payment period (e.g., 50.00). Omit if
            no payment plan is mentioned.
        - name: payment_plan_frequency
          type: ENUM
          description: >
            How often the installment payment is due. Omit if no payment plan is
            mentioned.
          values: [weekly, bi_weekly, monthly, quarterly, other]
          allowed_if_nonnull: payment_plan_amount
        - name: ability_to_pay
          type: ENUM
          description: >
            The person's assessed ability to pay the obligation. Omit if not
            mentioned or not determinable.
          values: [able, unable, limited, undetermined]
