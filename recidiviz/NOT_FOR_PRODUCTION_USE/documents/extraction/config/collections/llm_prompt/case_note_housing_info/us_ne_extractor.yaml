# US_NE-specific Housing Extractor
#
# Tuned for Nebraska's PIMS contact dashboard note format.

collection_name: CASE_NOTE_HOUSING_INFO

description: >
  Housing information extractor tuned for US_NE supervision contact notes.
  Handles Nebraska PIMS-specific terminology and document structure.

input_document_collection_name: US_NE_SUPERVISION_CONTACT_NOTES

llm_provider: vertex_ai
model: gemini-2.5-flash

prompt_vars:
  state_agency_name: "Nebraska Department of Correctional Services"
  state_specific_context: |
    Nebraska PIMS contact notes may include:
    - Home visit observations (contactLocation field)
    - Residence contact information (residenceContactInformation field)
    - Address changes and residence updates
    - Housing stability concerns
    - House parole information

    Transitional housing programs include:
    - Connecting Links (also commonly referred to as "CL" in notes)
  state_specific_fields_example: '(e.g., "Housing: X", "residenceContactInformation")'
