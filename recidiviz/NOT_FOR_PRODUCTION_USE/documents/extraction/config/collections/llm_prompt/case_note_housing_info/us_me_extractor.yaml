# US_ME-specific Housing Extractor
#
# Tuned for Maine's CIS supervision contact note format.

collection_name: CASE_NOTE_HOUSING_INFO

description: >
  Housing information extractor tuned for US_ME supervision contact notes.
  Handles Maine CIS-specific terminology and document structure.

input_document_collection_name: US_ME_SUPERVISION_CONTACT_NOTES

llm_provider: vertex_ai
model: gemini-2.5-flash
thinking_budget: 0

prompt_vars:
  state_agency_name: "Maine Department of Corrections"
  state_specific_context: |
    Maine CIS contact notes may include:
    - Case Plan/Management notes with housing information
    - Home visit observations
    - Address changes and residence updates
    - Housing stability concerns and transitional housing placements

    Note types in Maine CIS include:
    - Case Plan/Management
    - Education Notes
    - Program/Service notes
  state_specific_fields_example: '(e.g., "Housing: X")'
