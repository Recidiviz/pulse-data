# US_AZ-specific Housing Extractor
#
# Tuned for Arizona's ADCRR supervision case note format.

collection_name: CASE_NOTE_HOUSING_INFO

description: >
  Housing information extractor tuned for US_AZ supervision case notes.
  Handles Arizona ADCRR-specific terminology and document structure.

input_document_collection_name: US_AZ_SUPERVISION_CASE_NOTES

llm_provider: vertex_ai
model: gemini-2.5-flash

prompt_vars:
  state_agency_name: "Arizona Department of Corrections, Rehabilitation and Reentry"
  state_specific_context: |
    Arizona ADCRR supervision case notes may include:
    - Home visit observations and residence verifications
    - Address changes and residence updates
    - Housing stability concerns
    - Transitional housing or shelter placements
  state_specific_fields_example: '(e.g., "Housing: X")'
