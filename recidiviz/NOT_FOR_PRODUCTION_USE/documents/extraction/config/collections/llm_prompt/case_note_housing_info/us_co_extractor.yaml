# US_CO-specific Housing Extractor
#
# Tuned for Colorado's EOMIS supervision contact note format.

collection_name: CASE_NOTE_HOUSING_INFO

description: >
  Housing information extractor tuned for US_CO supervision contact notes.
  Handles Colorado EOMIS-specific terminology and document structure.

input_document_collection_name: US_CO_SUPERVISION_CONTACT_NOTES

llm_provider: vertex_ai
model: gemini-2.5-flash

prompt_vars:
  state_agency_name: "Colorado Department of Corrections"
  state_specific_context: |
    Colorado EOMIS contact notes may include:
    - Home visit observations and residence verifications
    - Address changes and residence updates
    - Housing stability concerns
    - Transitional housing or shelter placements
  state_specific_fields_example: '(e.g., "Housing: X")'
