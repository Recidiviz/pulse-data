# Extractor Collection: CASE_NOTE_REENTRY_DOCUMENTS_INFO
#
# Extractors in this collection identify reentry-related documents
# (e.g., identification, vital records) mentioned in facilities case notes.

name: CASE_NOTE_REENTRY_DOCUMENTS_INFO
confidence_threshold: 0.8

description: >
  Extract information about reentry-related documents mentioned in case notes,
  such as driver's licenses, social security cards, birth certificates, and
  other identification or vital records.

output_schema:
  full_batch_description: >
    An array of objects with reentry document information from a case note. Each
    element in the array corresponds to a single document type mentioned in the
    note.

  result_level_description: >
    Comprehensive extraction of reentry document information from a case note.

  inferred_fields:
    - name: documents
      type: ARRAY_OF_STRUCT
      description: >
        List of reentry-related documents mentioned in this note. Empty array if
        no document information is found.
      fields:
        - name: document_type
          type: ENUM
          description: The type of reentry-related document mentioned.
          values:
            [
              drivers_license,
              social_security_card,
              birth_certificate,
              state_id,
              passport,
              immigration_documents,
              military_discharge_dd214,
              vehicle_registration,
              insurance_card,
              medical_records,
              education_records,
              employment_records,
              other,
            ]
          required: true

        - name: document_status
          type: ENUM
          description: Whether the document is on file or missing.
          values: [on_file, missing]
          required: true

        - name: document_application_status_detail
          type: ENUM
          description: >
            Additional context about the document's application status. Omit if
            no additional detail beyond the basic on_file/missing status is
            mentioned.
          values:
            [
              application_submitted,
              application_in_progress,
              application_upcoming,
            ]
