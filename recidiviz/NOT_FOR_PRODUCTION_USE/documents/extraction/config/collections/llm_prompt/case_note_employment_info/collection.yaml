# Extractor Collection: CASE_NOTE_EMPLOYMENT_INFO
#
# Example collection config demonstrating the extraction schema format.
# Real extraction schemas live in the mayukas/document-extraction-configs branch.

name: CASE_NOTE_EMPLOYMENT_INFO
confidence_threshold: 0.8

description: >
  Extract information about a person's employment status from case notes.

output_schema:
  full_batch_description: >
    Employment information extracted from a case note.

  result_level_description: >
    Employment information for a single case note.

  inferred_fields:
    - name: employment_status
      type: ENUM
      description: The person's employment status.
      values: [employed, unemployed, other]
      required: true

    - name: employment_status_summary
      type: STRING
      description: >
        A brief human-readable summary of the person's employment status.
      required: true

    - name: employer_name
      type: STRING
      description: >
        Name of the employer or organization.
      allowed_if_value:
        employment_status: employed

    - name: employment_change_date
      type: STRING
      description: >
        Date of the most recent employment status change.
      allowed_if_nonnull: employment_change_type

    - name: employment_change_type
      type: ENUM
      description: >
        Type of employment status change.
      values: [hired, fired, quit, laid_off, retired]
      allowed_value_combinations:
        employment_status:
          employed: [hired, fired, quit, laid_off, retired]
          unemployed: [fired, quit, laid_off, retired]
          other: [fired, quit, laid_off, retired]
