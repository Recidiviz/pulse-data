# Extractor Collection: CASE_NOTE_EMPLOYMENT_INFO
#
# Extractors in this collection identify employment-related information
# from case notes.

name: CASE_NOTE_EMPLOYMENT_INFO
confidence_threshold: 0.8

description: >
  Extract information about a person's employment status, including whether they
  are currently employed, their employer name, job title, employment type, and
  any noted barriers to employment.

output_schema:
  full_batch_description: >
    Employment information extracted from a case note.

  result_level_description: >
    Comprehensive extraction of employment-related information from a single
    case note. Each document produces exactly one result.

  inferred_fields:
    - name: primary_status
      type: ENUM
      description: The main employment status.
      values: [employed, unemployed, other]
      required: true

    - name: search_status
      type: ENUM
      description: Current job search status.
      values: [searching, not_searching, other]
      required: true

    - name: employers
      type: ARRAY_OF_STRUCT
      description: >
        List of employers mentioned in this note. Empty array if person is
        unemployed or no employer details are available.
      allowed_if_value:
        primary_status: employed
      fields:
        - name: employer_name
          type: STRING
          description: Name of the employer/organization.

        - name: self_employed
          type: BOOLEAN
          description:
            True if self-employed, false if employer_name is provided, omit if
            unclear.

        - name: employment_type
          type: ENUM
          description: Type of employment relationship.
          values:
            [
              employee_ft,
              employee_pt,
              intern,
              apprentice,
              contractor_1099,
              temp_agency,
              seasonal,
              volunteer,
              gig,
              day_labor,
              cash_informal,
            ]

        - name: job_title
          type: STRING
          description:
            The person's job title (e.g., 'cashier', 'laborer'). Omit if not
            mentioned.

        - name: employer_location
          type: STRING
          description: Worksite location description or address. Omit if not mentioned.

        - name: pay_rate_amount
          type: FLOAT
          description: Numeric pay rate amount (e.g., 15.50, 50000). Omit if unknown.

        - name: pay_rate_time_period
          type: ENUM
          description: The time period the pay rate amount covers.
          allowed_if_nonnull: pay_rate_amount
          values:
            [
              hour,
              day,
              week,
              bi_weekly,
              month,
              year,
              paycheck_period,
              YTD,
              piece_rate,
              commission,
              stipend,
              salary_unspecified_period,
              other,
            ]

    - name: employment_changes
      type: ARRAY_OF_STRUCT
      description: >
        List of employment changes mentioned in this note. Empty array if no
        changes are mentioned.
      fields:
        - name: employment_change_type
          type: ENUM
          description: Type of employment change.
          values:
            [
              no_change,
              fired,
              quit,
              other_became_unemployed,
              changed_employer,
              started_employment,
            ]

        - name: employment_change_date
          type: STRING
          description:
            Date of the employment change if mentioned (free text, e.g.,
            "2024-01-15" or "last week").
          allowed_if_nonnull: employment_change_type
