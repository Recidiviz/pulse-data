# Known entities for Idaho (US_IX) supervision clients.
#
# Each entry provides the LLM with prior knowledge about a proper noun so it can
# classify it correctly without needing to infer entity type from context alone.
#
# Supported entity_type values and their effects on extraction prompts:
#   nonresidential_program   - NOT a housing location; NOT an employer
#                              (covers drug courts, supervision programs, definitively outpatient treatment)
#   community_corrections    - primary_status: in_custody (DOC-supervised facility); NOT an employer
#   residential_treatment    - may be residential or outpatient; NOT an employer
#                              (LLM uses context to determine if person is living there or attending outpatient)
#   sober_living             - temporary_housing / sober_living; NOT an employer
#   halfway_house            - temporary_housing / transitional_program; NOT an employer
#   shelter                  - temporary_housing / shelter; NOT an employer
#   hotel_motel              - temporary_housing / hotel_motel; NOT an employer
#   staffing_agency          - NOT a housing location; employment_type: temp_agency
#   employer                 - NOT a housing location; no classification hint
#
# Optional fields:
#   notes: human-readable note explaining the classification (not injected into prompt)
#
# The LLM handles minor spelling variations and abbreviations of the name listed.
# Only add aliases when a name looks nothing like the canonical form (opaque acronyms).
#
# Data source: bootstrapped from entity resolution results (housing and employer
# entity resolution tables, filtered to names appearing for >= 3 distinct persons),
# with additional entities inferred from case note context. Entity types were
# annotated by hand.

known_entities:
  # --- COMMUNITY CORRECTIONS ---
