# Configuration for US_AZ case notes document collection
#
# This collection stores case notes from ADCRR (Arizona Department of Corrections,
# Rehabilitation and Reentry) for incarcerated individuals.

collection_description: >
  Case notes from US_AZ ADCRR documenting interactions, assessments, and
  case management activities for incarcerated individuals in facilities.

root_entity_type: PERSON_EXTERNAL_ID

primary_key_columns:
  - name: case_note_id
    type: STRING
    description: The unique identifier for the case note (CASE_NOTE_ID)

additional_metadata_columns:
  - name: note_type_id
    type: STRING
    description: Foreign key to lookup table for note type
  - name: alert_type_id
    type: STRING
    description: Foreign key to lookup table for alert type
  - name: contact_codes
    type: STRING
    description: Contact codes related to the case note

document_generation_query: |
  SELECT
    PERSON_ID AS person_external_id,
    'US_AZ_PERSON_ID' AS person_external_id_type,
    CAST(CASE_NOTE_ID AS STRING) AS case_note_id,
    CAST(NOTE_TYPE_ID AS STRING) AS note_type_id,
    CAST(ALERT_TYPE_ID AS STRING) AS alert_type_id,
    contact_codes,
    COALESCE(note_text, xnote_text, '') AS document_text,
    CAST(CREATE_DTM AS TIMESTAMP) AS document_update_datetime
  FROM `{project_id}.us_az_raw_data_up_to_date_views.CASE_NOTE_latest`
  WHERE ((note_text IS NOT NULL AND TRIM(note_text) != '')
     OR (xnote_text IS NOT NULL AND TRIM(xnote_text) != ''))
    AND COALESCE(entered_in_error, 'N') != 'Y'
    AND COALESCE(active, 'Y') = 'Y'
