# Configuration for US_TN supervision contact notes document collection
#
# This collection stores contact note comments from Tennessee supervision
# officers, joined with contact type classifications.

collection_description: >
  Contact note comments from US_TN supervision officers documenting interactions
  with people on supervision. Each note includes freeform comment text and
  aggregated contact type classifications.

root_entity_type: PERSON_EXTERNAL_ID

primary_key_columns:
  - name: contact_note_datetime
    type: STRING
    description: The datetime the contact note was recorded

additional_metadata_columns:
  - name: contact_note_types
    type: STRING
    description: Comma-separated list of contact note type codes for this contact

document_generation_query: |
  SELECT
    comments.OffenderID AS person_external_id,
    'US_TN_DOC' AS person_external_id_type,
    CAST(comments.ContactNoteDateTime AS STRING) AS contact_note_datetime,
    STRING_AGG(DISTINCT types.ContactNoteType, ', ' ORDER BY types.ContactNoteType) AS contact_note_types,
    COALESCE(comments.Comment, '') AS document_text,
    CAST(comments.ContactNoteDateTime AS TIMESTAMP) AS document_update_datetime
  FROM `{project_id}.us_tn_raw_data_up_to_date_views.ContactNoteComment_latest` comments
  LEFT JOIN `{project_id}.us_tn_raw_data_up_to_date_views.ContactNoteType_latest` types
    ON comments.OffenderID = types.OffenderID
    AND comments.ContactNoteDateTime = types.ContactNoteDateTime
  WHERE comments.Comment IS NOT NULL
    AND TRIM(comments.Comment) != ''
    AND SAFE.PARSE_DATE('%Y-%m-%d', SUBSTR(comments.ContactNoteDateTime, 1, 10)) >= DATE_SUB(CURRENT_DATE('US/Eastern'), INTERVAL 3 YEAR)
    AND (
      -- Keep notes with no type records (unclassified)
      NOT EXISTS (
        SELECT 1 FROM `{project_id}.us_tn_raw_data_up_to_date_views.ContactNoteType_latest` excl_t
        WHERE excl_t.OffenderID = comments.OffenderID
          AND excl_t.ContactNoteDateTime = comments.ContactNoteDateTime
      )
      OR
      -- Keep notes that have at least one substantive (non-noise) type
      EXISTS (
        SELECT 1 FROM `{project_id}.us_tn_raw_data_up_to_date_views.ContactNoteType_latest` incl_t
        WHERE incl_t.OffenderID = comments.OffenderID
          AND incl_t.ContactNoteDateTime = comments.ContactNoteDateTime
          AND incl_t.ContactNoteType NOT IN (
            'IOTI', 'IOTO',  -- boilerplate semi-structured checkins (officer admin only)
            'ITFB', 'ITSS',  -- short notes that record delivery of reentry resources to residents of a facility (e.g., timesheets, balances) 
            'KITI',          -- short notes that record delivery of kits to residents of a facility (e.g., hygiene kits, COVID test kits)
            'ZZZZ', 'ZZZA', 'ZZZI', 'ZZZC',  -- notes related to case file closure
            'SCRN',          -- in facility notes related to screenings (e.g., PREA)
            'ELEA',          -- measures attendance for in-facility electives
            'ZTVR',          -- violation reports
            'BBNN'           -- NCIC checks
          )
      )
    )
  GROUP BY comments.OffenderID, comments.ContactNoteDateTime, comments.Comment
