address:
  dataset_id: document_extraction_metadata
  table_id: extraction_job_results

description: |
  Aggregated job-level results. One row per completed job. Written when all
  documents in a job have been processed.

schema:
  - name: job_id
    type: STRING
    mode: REQUIRED
    description: UUID of the extraction job

  - name: result_datetime
    type: TIMESTAMP
    mode: REQUIRED
    description: When result processing completed

  - name: num_documents_originally_submitted
    type: INTEGER
    mode: REQUIRED
    description: Number of documents originally submitted

  - name: num_successful_extractions
    type: INTEGER
    mode: REQUIRED
    description: Number of successful extractions

  - name: num_failed_extractions
    type: INTEGER
    mode: REQUIRED
    description: Number of failed extractions

  - name: error_type
    type: STRING
    mode: NULLABLE
    description: "Structured job-level error type. See ExtractionJobErrorType enum."

  - name: error_message
    type: STRING
    mode: NULLABLE
    description: Human-readable error details for job-level failures

clustering_fields: null
