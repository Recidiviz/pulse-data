description: Fake case notes for testing document collection config parsing.
root_entity_id_type: person_external_id
document_metadata_columns:
  - name: note_id
    is_document_primary_key: true
    field_type: STRING
    description: The unique identifier for the case note
  - name: note_type
    field_type: STRING
    description: The type of note
document_generation_query: |
  SELECT
    person_id AS person_external_id,
    'US_XX_DOC' AS person_external_id_type,
    note_id,
    note_type,
    note_body AS document_text,
    CAST(created_at AS TIMESTAMP) AS document_update_datetime
  FROM `{project_id}.us_xx_raw_data.fake_notes`
