# yaml-language-server: $schema=./../../../../../documents/store/yaml_schema/schema.json
description: >
  Fake input document collection that the fake extractor reads, used by
  llm_extractor_config_test.py to exercise extractor config resolution.
root_entity_id_type: person_external_id
document_metadata_columns:
  - name: note_id
    is_document_primary_key: true
    field_type: STRING
    description: The unique identifier for the note
document_generation_query: |
  SELECT
    person_id AS person_external_id,
    'US_XX_DOC' AS person_external_id_type,
    note_id,
    note_body AS document_text,
    CAST(created_at AS TIMESTAMP) AS document_update_datetime
  FROM `{project_id}.us_xx_raw_data.fake_input_notes`
