# A valid extractor config declaring only the required fields, so the model
# resolves to the collection default and the char-count caps, retry count, and
# prompt vars all fall back to their code-level defaults / empty.
extractor_collection_name: FAKE_EXTRACTOR_COLLECTION

input_document_collection_name: FAKE_INPUT_NOTES

document_metadata_filter_query_template: |
  SELECT document_contents_id FROM `{project_id}.x.y`
