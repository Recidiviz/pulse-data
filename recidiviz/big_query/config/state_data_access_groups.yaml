# Cloud Identity group resource names for state-specific BQ data access groups.
# These control row-level access permissions via google_cloud_identity_group_membership
# resources in Terraform.
#
# Each state's Dataflow SA is added to the appropriate group:
# - Restricted states (those in restricted_access_state_groups.yaml) are added
#   to their state-specific group.
# - Non-restricted states are added to s-default-state-data@recidiviz.org so
#   they can access non-restricted state data in state-agnostic BQ tables.
#
# To add a new state:
# 1. Create a new Google Group named s-{state}-data@recidiviz.org via
#    Google Workspace admin (admin.google.com > Directory > Groups)
# 2. Get the group's resource name:
#    gcloud identity groups describe "s-{state}-data@recidiviz.org" --format="value(name)"
# 3. Add the state code and resource name to this file
# 4. If the state has row-level access restrictions, also add it to
#    restricted_access_state_groups.yaml
#
# The resource name for s-default-state-data@recidiviz.org (used for non-restricted
# states) is: groups/03cqmetx1ujo2ct

US_AR: groups/03jtnz0s24c62yo # s-ar-data@recidiviz.org
