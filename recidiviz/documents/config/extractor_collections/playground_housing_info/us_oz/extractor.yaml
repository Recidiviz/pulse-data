extractor_collection_name: PLAYGROUND_HOUSING_INFO

input_document_collection_name: FELLOWSHIP_SUPERVISION_NOTES

# No overrides: this extractor exercises the all-defaults path (collection
# default model config, code-level default caps and retry count).

document_metadata_filter_query_template: |
  SELECT document_contents_id
  FROM `{project_id}.us_oz_document_store_metadata.fellowship_supervision_notes`
  WHERE document_contents_id IS NOT NULL

prompt_vars:
  state_agency_name: "the Reunited Kingdom Department of Reentry"
  state_specific_context: |
    These notes concern persons formerly incarcerated in Middle-earth
    facilities (Mordor, Isengard, Barad-dûr). Place names may be given in
    multiple languages (e.g. Aglarond and the Glittering Caves are the same
    place). Officers often refer to people by their aliases (e.g. Strider,
    Mithrandir).
