# =============================================================================
# This file is used to define config to be used by the stable_historical_counts_table_validation.
# This file contains the following default values:
#  - time_window_lookback_days
#    The number of days to look back when calculating the median row count for a file.
#  - percent_change_tolerance
#    The percent change tolerance to use when comparing the median row count of a file
# And the following values that can be configured on a per-file tag basis:
#   - tolerance_override
#     This value is used to override the default percent change tolerance. This may be useful
#     for small files where even small changes in file size can cause large percent changes.
#   - date_range_exclusions
#     All files with an update_datetime within an excluded date range will (1) have the stable historical counts validation skipped
#     and (2) have their row counts excluded when calculating the median row count for other files.
#     This might be useful if there is a jump in file size, you can exclude older entries that have lower raw row counts.
#     If you import a file that has an update datetime within an excluded range, the validation will be skipped,
#     and the raw row count of that imported will be excluded from future median calculations.
#     This might be useful if you need to import a file that has an anomalously high or low row count but is valid.
#     The same file tag in the same region can have multiple entries if you want to exclude multiple distinct datetime ranges.
defaults:
  time_window_lookback_days: 90
  percent_change_tolerance: 0.1
#
# Example format:
#
#custom:
#  US_XX:
#    file_tags:
#      example_file_tag:
#        tolerance_override:
#          percent_change_tolerance: 0.25
#          reason:
#            "This is an example of a custom percent change tolerance for a
#            specific file in a specific state."
#        date_range_exclusions:
#          - datetime_start_inclusive: "2024-08-01T00:00:00Z"
#            datetime_end_exclusive: "2024-08-15T00:00:00Z"
#            reason:
#              "This is an example of a date range exclusion for a specific file in
#              a specific state."

custom:
  US_AR:
    file_tags:
      CASEMANAGEMENTPLAN:
        date_range_exclusions:
          - datetime_start_inclusive: "2026-02-10T00:00:00Z"
            datetime_end_exclusive: "2026-04-01T00:00:00Z"
            reason:
              "This table's median row count is driven down by some early versions of the table
              that were much smaller. The table size should be relatively stable from April 2026 onwards."

  US_MI:
    file_tags:
      COMS_Case_Managers:
        date_range_exclusions:
          - datetime_start_inclusive: "2023-08-22T00:00:00Z"
            datetime_end_exclusive: "2025-08-28T00:00:00Z"
            reason:
              "This table was modified on 2025-08-28 to also include prison case
              manager assignments (previously, it only included supervision
              officer assignments)."

  US_MO:
    file_tags:
      LBAKRDTA_TAK034:
        date_range_exclusions:
          - datetime_start_inclusive: "2023-01-10T00:00:00Z"
            datetime_end_exclusive: "2026-03-03T00:00:00Z"
            reason:
              "This file switched from incremental to full historical so this
              jump is expected."

  US_NC:
    file_tags:
      rna_prison:
        date_range_exclusions:
          - datetime_start_inclusive: "2025-12-20T00:00:00Z"
            datetime_end_exclusive: "2026-04-11T00:00:00Z"
            reason:
              "We've started receiving new individuals while we're making changes to
              support write-back. Likely related but not sure exact reasons yet."

  US_TN:
    file_tags:
      VantagePointProgram:
        date_range_exclusions:
          - datetime_start_inclusive: "2022-03-22T00:00:00Z"
            datetime_end_exclusive: "2025-04-01T00:00:00Z"
            reason:
              "This table was modified on 2024-03-30 to seperate 'classes' from
              'programs' so the table went from 48 records to 10. This is
              expected so we want to add a data-bounded exclusion from the first
              case of a file being received --> today, which will exclude those
              dates from validation & from being used to calculate the median
              historical row count"

  US_IA:
    file_tags:
      IA_DOC_SupervisionStatuses:
        date_range_exclusions:
          - datetime_start_inclusive: "2024-09-17T00:00:00Z"
            datetime_end_exclusive: "2025-10-21T00:00:00Z"
            reason: "This table was modified on 2025-10-21 to be full historical
              instead of a 14 day diff"

  US_UT:
    file_tags:
      spcl_cond_cd:
        tolerance_override:
          percent_change_tolerance: 0.25
          reason:
            "Naturally growing reference table not used in any downstream views.
            Observed a 21% jump in May 2026; set to 25% to accommodate continued
            organic growth."
      rim_accomp_spcl_cond:
        tolerance_override:
          percent_change_tolerance: 0.35
          reason:
            "Naturally growing reference table not used in any downstream views.
            Observed a 30% jump in May 2026; set to 35% to accommodate continued
            organic growth."
      rim_accomp_agrmnt_cond:
        tolerance_override:
          percent_change_tolerance: 0.25
          reason:
            "Naturally growing reference table not used in any downstream views.
            Observed an 18% jump in May 2026; set to 25% to accommodate continued
            organic growth."
      p_p_agrmnt_cond_cd:
        tolerance_override:
          percent_change_tolerance: 0.20
          reason:
            "Naturally growing reference table not used in any downstream views.
            Observed a 14% jump in May 2026; set to 20% to accommodate continued
            organic growth."
      p_p_agrmnt_cat_cd:
        date_range_exclusions:
          - datetime_start_inclusive: "2024-08-22T00:00:00Z"
            datetime_end_exclusive: "2025-12-12T00:00:00Z"
            reason: "File size jumped after this date range."

  US_TX:
    file_tags:
      TPCURBAL:
        date_range_exclusions:
          - datetime_start_inclusive: "2024-01-01T00:00:00Z"
            datetime_end_exclusive: "2026-05-22T00:00:00Z"
            reason:
              "Table was changed to use FULL_HISTORICAL_LOOKBACK on 2026-05-22,
              causing row count to jump from ~6.9k to ~106k. Excluding historical
              smaller imports from the median calculation."
