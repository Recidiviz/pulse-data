# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in
# `view_isc_sentence_length` to corresponding Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  # Form the unique ID for sentences.
  OffenderID: STRING
  Jurisdiction: STRING
  CaseYear: STRING
  CaseNumber: STRING
  CountNumber: STRING

  LastUpdateDate: DATE
  ExpirationDate: DATE
  ReleaseEligibilityDate: DATE

unused_columns: []
variables:
  - sentence_external_id:
      $concat:
        $separator: "@@"
        $values:
          - OffenderID
          - Jurisdiction
          - CaseYear
          - CaseNumber
          - CountNumber
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: OffenderID
          id_type: $literal("US_TN_DOC")
    sentences:
      - StateSentence:
          external_id: $variable(sentence_external_id)
          sentence_lengths:
            - StateSentenceLength:
                length_update_datetime: LastUpdateDate
                parole_eligibility_date_external: ReleaseEligibilityDate
                # ISC sentences have a single ExpirationDate with no
                # min/max distinction. We map to max since that is what
                # downstream criteria reference.
                projected_completion_date_max_external: ExpirationDate
