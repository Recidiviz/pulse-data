# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in
# `view_diversion_sentence_length` to corresponding Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  # Form the unique ID for sentences.
  OffenderID: STRING
  ConvictionCounty: STRING
  CaseYear: STRING
  CaseNumber: STRING
  CountNumber: STRING

  update_datetime: DATETIME
  ExpirationDate: DATE

unused_columns: []
variables:
  - sentence_external_id:
      $concat:
        $separator: "@@"
        $values:
          - OffenderID
          - ConvictionCounty
          - CaseYear
          - CaseNumber
          - CountNumber
          # Must match the suffix used in us_tn_diversion_sentence.yaml
          - $literal("DIVERSION")
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: OffenderID
          id_type: $literal("US_TN_DOC")
    sentences:
      - StateSentence:
          external_id: $variable(sentence_external_id)
          sentence_lengths:
            - StateSentenceLength:
                length_update_datetime: update_datetime
                # Diversion sentences have a single ExpirationDate with no
                # min/max distinction. We map to max since that is what
                # downstream criteria reference.
                projected_completion_date_max_external: ExpirationDate
