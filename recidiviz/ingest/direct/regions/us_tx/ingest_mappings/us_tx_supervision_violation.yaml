# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in `view_supervision_violation` to the corresponding
# Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  VIOLATION_ID: STRING
  SID_Number: STRING
  VIOLATION_DATE: DATE
  condition_array: STRING
  VIOLATION_STATUS: STRING
unused_columns: []
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: SID_Number
          id_type: $literal("US_TX_SID")
    supervision_violations:
      - StateSupervisionViolation:
          external_id: VIOLATION_ID
          violation_date: VIOLATION_DATE
          violation_metadata:
            $normalized_values_json_dict:
              ViolationStatus: VIOLATION_STATUS
          supervision_violation_types:
            - $foreach:
                $iterable: condition_array
                $result:
                  StateSupervisionViolationTypeEntry:
                    violation_type:
                      $enum_mapping:
                        $raw_text: $iter_item
                        $mappings:
                          StateSupervisionViolationType.ABSCONDED:
                            - "FOLLOW REPORTING INSTRUCTIONS"
                            - "ATTEND ALL PROCEEDINGS CONCERNING ALLEGED VIOLATIONS OF PAROLE"
                          StateSupervisionViolationType.LAW:
                            - "OFFENSE AGAINST STATE LAWS"
                            - "OUT OF STATE ALLEGATION"
                            - "GAIN UNLAWFUL ENTRY INTO US IF DEPORTED OR RELEASED TO DETAINER"
                            - "NO ILLEGAL POSSESSION OF WEAPONS"
                          StateSupervisionViolationType.TECHNICAL:
                            - "FOLLOW INSTRUCTIONS FROM MY PAROLE OFFICER"
                            - "RESIDE IN AN APPROVED PLACE"
                            - "ABIDE BY ALL THE RULES OF THE FACILITY RESIDING IN"
                            - "TRAVEL(OUT OF TEXAS) WITHOUT PRIOR APPROVAL"
