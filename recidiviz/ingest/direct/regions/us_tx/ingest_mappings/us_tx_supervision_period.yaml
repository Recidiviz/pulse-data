# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in `view_supervision_period`
# to corresponding Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  SID_NO: STRING
  XREF_ID: STRING
  Case_Type: STRING
  CTH_CASE_CAT_REAS: STRING
  SLH_SUP_LEVEL: STRING
  SLH_SUP_LEVEL_REAS: STRING
  status: STRING
  STH_STATUS_REAS: STRING
  active_special_conditions: STRING
  supervision_site: STRING
  WTSK_USER_ID: STRING
  RMF_RELEASE_TYPE: STRING
  termination_reason: STRING
  start_date: DATE
  end_date: DATE
  rn: INTEGER
unused_columns:
  - RMF_RELEASE_TYPE
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: SID_NO
          id_type: $literal("US_TX_SID")
    supervision_periods:
      - StateSupervisionPeriod:
          external_id:
            $concat:
              $values:
                - XREF_ID
                - rn
          start_date: start_date
          #Todo(#35059 Consider early release when hydrating termination date)
          termination_date: end_date
          termination_reason:
            $enum_mapping:
              $raw_text: termination_reason
              $mappings:
                StateSupervisionPeriodTerminationReason.DEATH:
                  - Death
                  - Death reported
                StateSupervisionPeriodTerminationReason.DISCHARGE:
                  - Discharge
                  - Early Release From Supervision
                  - Administrative Closure
                  - Returned to TDCJ-ID - Allow to Dschg/Not revoked
                StateSupervisionPeriodTerminationReason.PARDONED:
                  - Full pardon
                StateSupervisionPeriodTerminationReason.REVOCATION:
                  - Revoked
                  - Revoked - OOS
                StateSupervisionPeriodTerminationReason.ABSCONSION:
                  - Revocation Warrant Issued - Not in Custody
                  - Pending warrant closure
                StateSupervisionPeriodTerminationReason.ADMITTED_TO_INCARCERATION:
                  - Pre-Revocation - In Custody
                  - Pre-Revocation - Not in Custody
                  - Pre-Revocation - ISF
                  - Pre-Revocation - FCI
                  - Pre-Revocation - OOS
                  - Pre-revocation - SAFPF
                  - Pre-revocation - State Jail
                  - Pre-revocation - Released on Bond
                  - "Pre-revocation - Not in Custody/Not Absonder"
                  - "Pre-revocation - TDCJ-ID (Pending Hearing)"
                  - In custody - county jail
                  - In custody - state jail
                  - In Custody FCI - No PRW
                  - In Custody OOS - No PRW
                  - "In Custody OOS/FCI - Pending TDCJ Detainer"
                  - Erroneous release - In custody
                  - Erroneous release - Not in custody
                  - Erroneous Release Returned to ID
                  - "Returned to TDCJ-ID - Snow Case/Previous charge"
                  - TDCJ detainer
                StateSupervisionPeriodTerminationReason.TRANSFER_TO_OTHER_JURISDICTION:
                  - Deported OOC
                  - Supervised out of state
                  - Returned ICC offender to sending state
                  - "Released, Pending arrival to OOS"
                  - ISC Offender With New Texas Conviction To ID
                  - Other Agency Detainer
                StateSupervisionPeriodTerminationReason.VACATED:
                  - Sentence Reversed
                StateSupervisionPeriodTerminationReason.TRANSFER_WITHIN_STATE:
                  - Normal Report
                  - Quarterly Report
                  - "Annual Report-Inactive"
                  - "Annual Report-Active"
                  - "Released - Pending arrival"
                StateSupervisionPeriodTerminationReason.INTERNAL_UNKNOWN:
                  - Removed from Review Process
                  - Post revocation action release
                  - PRA Approved
                  - Snow Case
                  - Pending arrival from OOS
                  - ISC Review
                  - ISC Rejected
                  - ISC failure to arrive
                  - Pre Release
                  - "Rel. review"
                  - BPP review
                  - Board vote
                  - "Rel.ready review"
                  - "Rel.ready"
                  - "RW-not IC"
                  - TDCJ-ID no RW
                  - "Legacy Rel. review"
                  - Legacy BPP review
                  - Legacy board vote
                  - "Legacy Rel.ready"
          supervision_period_metadata:
            $normalized_values_json_dict:
              status: status
              status_reason: STH_STATUS_REAS
              special_conditions: active_special_conditions
              case_type_reason: CTH_CASE_CAT_REAS
              supervision_level_reason: SLH_SUP_LEVEL_REAS
          supervision_site: supervision_site
          supervising_officer_staff_external_id: WTSK_USER_ID
          supervising_officer_staff_external_id_type:
            $conditional:
              - $if:
                  $not_null: WTSK_USER_ID
                $then: $literal("US_TX_STAFF_ID")
          supervision_type: $literal_enum(StateSupervisionPeriodSupervisionType.PAROLE)
          supervision_level:
            $enum_mapping:
              $raw_text:
                $concat:
                  $separator: "@@"
                  $values:
                    - Case_Type
                    - status
                    - SLH_SUP_LEVEL
                    - active_special_conditions
              $custom_parser: us_tx_custom_enum_parsers.parse_supervision_level
          case_type_entries:
            - StateSupervisionCaseTypeEntry:
                case_type:
                  $enum_mapping:
                    $raw_text: Case_Type
                    $mappings:
                      StateSupervisionCaseType.GENERAL:
                        - Regular
                        # If TC program is completed then treat as regular case type
                        - Substance abuse - COMPLETED
                      StateSupervisionCaseType.SEX_OFFENSE:
                        - Sex offender
                      StateSupervisionCaseType.DRUG_COURT:
                        - Substance abuse - PHASE 1
                        - Substance abuse - PHASE 2
                        - Substance abuse - PHASE 3
                        - Substance abuse - PHASE 1B
                        - Substance abuse - PRSAP
                        #TODO(#41754) Refactor the Phases logic to have it be historically acurate
                        - Substance abuse
                      StateSupervisionCaseType.INTERNAL_UNKNOWN:
                        - Administrative
                        - Annual
                        - Non-reporting
                        - Other
                        - SRC (25 TO 1)
                      StateSupervisionCaseType.EXTERNAL_UNKNOWN:
                        - Unknown
                      StateSupervisionCaseType.SERIOUS_MENTAL_ILLNESS_OR_DISABILITY:
                        - Intellectually Disabled
                        - Mentally ill
                      StateSupervisionCaseType.ELECTRONIC_MONITORING:
                        - Electronic monitoring
                      StateSupervisionCaseType.INTENSE_SUPERVISION:
                        - Super-intensive supervision
                      StateSupervisionCaseType.DAY_REPORTING:
                        - Day/district resource center
                      StateSupervisionCaseType.PHYSICAL_ILLNESS_OR_DISABILITY:
                        - Terminally Ill / Physically Handicapped
                        - Medically recommended intensive supervision
