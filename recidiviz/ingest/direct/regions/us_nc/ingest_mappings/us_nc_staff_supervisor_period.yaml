# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
manifest_language: 1.0.0
input_columns:
  CFOFICER: STRING
  matched_CFOSUPNO: STRING
  update_datetime: DATETIME
  end_date: DATETIME
  seq: INTEGER
unused_columns: []
output:
  StateStaff:
    external_ids:
      - StateStaffExternalId:
          external_id: CFOFICER
          id_type: $literal("US_NC_STAFF")
    supervisor_periods:
      - StateStaffSupervisorPeriod:
          external_id:
            $concat:
              $values:
                - CFOFICER
                - seq
          supervisor_staff_external_id: matched_CFOSUPNO
          supervisor_staff_external_id_type: $literal("US_NC_STAFF")
          start_date: update_datetime
          end_date: end_date
