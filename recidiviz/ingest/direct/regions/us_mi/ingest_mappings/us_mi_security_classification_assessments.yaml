# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in `view_security_classification_assessments` to the corresponding
# Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  OffenderNumber: STRING
  FinalizedDate: DATE
  DecisionCategory: STRING
  OffenderAssessmentId: STRING
  ConfinementLevel: STRING
  ManagementLevel: STRING
  TrueSecurityLevel: STRING
  ActualPlacementLevel: STRING
  WaiverReason: STRING
  DepartureReason: STRING
  management_raw_score: INTEGER
unused_columns: []
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: OffenderNumber
          id_type: $literal("US_MI_DOC")
    assessments:
      - StateAssessment:
          external_id:
            $concat:
              $values:
                - $literal("SECURITY")
                - OffenderAssessmentId
          assessment_class: $literal_enum(StateAssessmentClass.RISK)
          assessment_type: $literal_enum(StateAssessmentType.MI_SECURITY_CLASS)
          assessment_date: FinalizedDate
          assessment_score: management_raw_score
          assessment_level:
            $enum_mapping:
              $raw_text: TrueSecurityLevel
              $mappings:
                StateAssessmentLevel.VERY_HIGH:
                  - "V"
                StateAssessmentLevel.HIGH:
                  - "IV"
                StateAssessmentLevel.MEDIUM:
                  - "II"
                StateAssessmentLevel.LOW:
                  - "I"
          assessment_metadata:
            $normalized_values_json_dict:
              Confinement_Level_Assessment_Result: ConfinementLevel
              Management_Level_Assessment_Result: ManagementLevel
              True_Security_Level_Assessment_Result: TrueSecurityLevel
              Actual_Placement_Level_Assessment_Result: ActualPlacementLevel
              screen_type: DecisionCategory
              management_raw_score: management_raw_score
              Waiver_Reason: WaiverReason
              Departure_Reason: DepartureReason
