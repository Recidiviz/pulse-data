# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in `view_supervision_contacts to
#  corresponding Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  OFFENDERID: STRING
  CONTACTDATETIME: DATETIME
  CONTACTMETHOD: STRING
  CONTACTTYPE: STRING
  CONTACTSTAFF: STRING
  CONTACTOFFICE: STRING
  EMPLOYMENTSTATUS: STRING
  contact_codes: STRING
unused_columns: []
variables:
  # TODO(#67310): Refactor to use a single dict mapping contact codes to descriptions
  - is_employment_verification:
      $custom:
        $function: us_co_custom_parsers.has_contact_code
        $args:
          contact_codes: contact_codes
          code: $literal("043")
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: OFFENDERID
          id_type: $literal("US_CO_OFFENDERID")
    supervision_contacts:
      - StateSupervisionContact:
          external_id:
            $concat:
              $values:
                - OFFENDERID
                - CONTACTDATETIME
                - CONTACTTYPE
          contacting_staff_external_id: CONTACTSTAFF
          contacting_staff_external_id_type:
            $conditional:
              - $if:
                  $not_null: CONTACTSTAFF
                $then: $literal("US_CO_PARTYID")
          contact_datetime: CONTACTDATETIME
          contact_type:
            $enum_mapping:
              $raw_text: CONTACTMETHOD
              $mappings:
                StateSupervisionContactType.DIRECT:
                  - 1@@Initial Offender FTF
                  - 2@@Offender FTF
                  - 4@@Offender Phone
                  - 8@@Re-entry FTF
                StateSupervisionContactType.COLLATERAL:
                  - 3@@Collateral FTF
                  - 5@@Collateral Phone
                  - 7@@Provider Meeting FTF
                ##StateSupervisionContactType.BOTH_COLLATERAL_AND_DIRECT:
                StateSupervisionContactType.INTERNAL_UNKNOWN:
                  - 0@@See Contact Code below # related to giving good time
                  - 6@@Attempt/No Contact
                  - A@@Equipment
                  - B@@Case Management
                  - C@@Text Message/Email
          contact_method:
            $enum_mapping:
              $raw_text: CONTACTMETHOD
              $mappings:
                StateSupervisionContactMethod.TELEPHONE:
                  - 4@@Offender Phone
                  - 5@@Collateral Phone
                StateSupervisionContactMethod.WRITTEN_MESSAGE:
                  - C@@Text Message/Email
                StateSupervisionContactMethod.IN_PERSON:
                  - 1@@Initial Offender FTF
                  - 2@@Offender FTF
                  - 3@@Collateral FTF
                  - 7@@Provider Meeting FTF
                  - 8@@Re-entry FTF
                StateSupervisionContactMethod.INTERNAL_UNKNOWN:
                  - 0@@See Contact Code below # related to giving good time
                  - 6@@Attempt/No Contact
                  - A@@Equipment
                  - B@@Case Management
          contact_reason:
            $enum_mapping:
              $raw_text: CONTACTMETHOD
              $mappings:
                StateSupervisionContactReason.INITIAL_CONTACT:
                  - 1@@Initial Offender FTF
                StateSupervisionContactReason.GENERAL_CONTACT:
                  - 2@@Offender FTF
                  - 3@@Collateral FTF
                  - 4@@Offender Phone
                  - 5@@Collateral Phone
                  - 8@@Re-entry FTF
                StateSupervisionContactReason.INTERNAL_UNKNOWN:
                  - 0@@See Contact Code below # related to giving good time
                  - 6@@Attempt/No Contact
                  - 7@@Provider Meeting FTF
                  - A@@Equipment
                  - B@@Case Management
                  - C@@Text Message/Email
          status:
            $enum_mapping:
              $raw_text: CONTACTMETHOD
              $mappings:
                StateSupervisionContactStatus.COMPLETED:
                  - 0@@See Contact Code below
                  - 1@@Initial Offender FTF
                  - 2@@Offender FTF
                  - 3@@Collateral FTF
                  - 4@@Offender Phone
                  - 5@@Collateral Phone
                  - 7@@Provider Meeting FTF
                  - 8@@Re-entry FTF
                  - A@@Equipment
                  - B@@Case Management
                  - C@@Text Message/Email
                StateSupervisionContactStatus.ATTEMPTED:
                  - 6@@Attempt/No Contact
          location:
            $enum_mapping:
              $raw_text: CONTACTTYPE
              $mappings:
                StateSupervisionContactLocation.FIELD:
                  - FC2@@Field Contact
                  - FC@@Agent-Visit-Field Contact
                StateSupervisionContactLocation.SUPERVISION_OFFICE:
                  - OV2@@Office
                  - OV@@Agent-Visit-Office
                  - TCH@@Technician Contact at Parole Office
                StateSupervisionContactLocation.PLACE_OF_EMPLOYMENT:
                  - EMP@@Agent-Visit-Employment
                StateSupervisionContactLocation.JAIL:
                  - JV2@@County Jail Visit
                  - HW2@@CCC Visit
                  - PR2@@Prison Visit
                  - JV@@Agent-Visit-County Jail
                  - HWH@@Agent-Visit-Comm. Corr. Center
                  - PRI@@Agent-Visit-Prison
                StateSupervisionContactLocation.INTERNAL_UNKNOWN:
                  - SCH@@School Visit
                  - CSA@@Case Audit Generated
                  - ED@@Education Updated
                  - AET@@Achievement Earned Time
                  - DB@@Drive By Visit
                  - HP2@@Hospital Visit
                  - VV@@Video Visit
                  - ATP@@ATP Contact
                  - WAG@@WAGEES Visit
                  - ADR@@Address Updated
                  - AH@@After Hours Visit
                  - AT@@Earn Time
                  - HRF@@Hold and Release Generated
                  - PL@@Placement Visit
                  - TCK@@Technician Contact
                  - TCJ@@Technician Contact at Vendor Office
                  - OTH@@Agent-Visit-Other
                  - YIN@@Legacy Incentives (CDOC_INCENTIVES)
                  - RHS@@Revocation Hearing Scheduled
                  - YJB@@Legacy Jail Based Treatment (CDOC_JBT)
                  - YLS@@Legacy LSI Assessment Data (CDOC_LSIFORM1st)
                  - XAB@@Jail Based Treatment (JBT)
                  - BIC@@BI Call Center
                  - SRC@@Sex Offender Registration Completed
                  - ADM@@Administrative
                  - PRO@@Protection Order
                  - XAE@@Collateral Contact Info.
                  - XAD@@Community Service Info.
                  - XAA@@Positive Incentives
                  - SS@@Social Service Visit
                  - XAC@@Volunteer Information
                  - YSS@@Legacy Smart Start (CDOC_SMART_START)
                  - CLS@@Caseload Summary
                  - HP@@Agent-Visit-Hospital
                  - YDR@@Legacy Drive Request (CDOC_DRIVE_REQ)
                  - NR@@Non-Relative Resd.
                  - FM@@Family Member Resd.
                StateSupervisionContactLocation.COURT:
                  - CT2@@Court Visit
                  - CT@@Agent-Visit-Court
                StateSupervisionContactLocation.LAW_ENFORCEMENT_AGENCY:
                  - LP@@Local Police Visit
                StateSupervisionContactLocation.RESIDENCE:
                  - HV@@Agent-Visit-Host Site (Home)
                  - HV2@@Host Site Visit
                StateSupervisionContactLocation.TREATMENT_PROVIDER:
                  - TPX@@Treatment Provider
                  - TX@@Agent-Visit-Service Provider
                  - AT2@@Service Provider Visit
          verified_employment: $variable(is_employment_verification)
          supervision_contact_metadata:
            $normalized_values_json_dict:
              EMPLOYMENTSTATUS: EMPLOYMENTSTATUS
              OFFICE: CONTACTOFFICE
              CONTACT_CODES: contact_codes
