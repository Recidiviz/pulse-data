# Identity mapping for the US_OZ `staff` data source. Each row produces one
# IdentityFragment for a staff member. Staff fragments carry up to two
# external IDs (a stable staff id and an optional badge id) plus name and
# email attributes.
manifest_language: 1.0.0
input_columns:
  StaffId: STRING
  BadgeId: STRING
  FirstName: STRING
  LastName: STRING
  Email: STRING
unused_columns: []
output:
  IdentityFragment:
    external_ids:
      - IdentityExternalId:
          external_id: StaffId
          id_type: $literal("US_OZ_IDENTITY_STAFF_ID")
      - $conditional:
          - $if:
              $not_null: BadgeId
            $then:
              IdentityExternalId:
                external_id: BadgeId
                id_type: $literal("US_OZ_IDENTITY_BADGE_ID")
    attributes:
      IdentityAttributes:
        person_type: $literal_enum(PersonType.STAFF)
        name:
          IdentityName:
            given_name: FirstName
            surname: LastName
        emails:
          - IdentityEmail:
              address: Email
