# yaml-language-server: $schema=./../../../ingest_mappings/yaml_schema/1.0.0/schema.json
# This file associates the columns outputted from the query in `view_program_assignment` to the corresponding
# Ingest Object fields.
manifest_language: 1.0.0
input_columns:
  inmateNumber: STRING
  NonClinicalProgramTrackingId: STRING
  fkProgramNameNCPTCode: STRING
  ProgramNameNCPT: STRING
  ProgramTypeNCPT: STRING
  referralDate: DATE
  acceptedOrRefused: STRING
  acceptedOrRefusedDate: DATE
  startDate: DATE
  endDate: DATE
  programOutcome: STRING
  AcceptRefuseHistory: STRING
unused_columns: []
output:
  StatePerson:
    external_ids:
      - StatePersonExternalId:
          external_id: inmateNumber
          id_type: $literal("US_NE_ID_NBR")
    program_assignments:
      - StateProgramAssignment:
          external_id:
            $concat:
              $values:
                - inmateNumber
                - NonClinicalProgramTrackingId
                - $literal("NONCLINICAL")
          program_id: fkProgramNameNCPTCode
          participation_status:
            $enum_mapping:
              $raw_text:
                $concat:
                  $separator: "@@"
                  $values:
                    - acceptedOrRefused
                    - programOutcome
                    - endDate
              $custom_parser: us_ne_custom_enum_parsers.parse_nonclinical_participation
          referral_date: referralDate
          start_date: startDate
          discharge_date: endDate
          referral_metadata:
            $normalized_values_json_dict:
              ProgramNameNCPT: ProgramNameNCPT
              ProgramTypeNCPT: ProgramTypeNCPT
              acceptedRefusedDate: acceptedOrRefusedDate
              AcceptRefuseHistory: AcceptRefuseHistory
