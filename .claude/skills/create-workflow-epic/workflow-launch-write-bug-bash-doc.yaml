title: "[{STATE_CODE}][Workflows][2W] {ACRONYM} - Write Bug Bash Documentation"
body: |
  Write comprehensive documentation for the bug bash session, including test scenarios, expected outcomes, and feedback collection methods. Use the [bug bash template](https://docs.google.com/document/d/1KhsOdwbISMWxbCjH7OvPlc2YJRj8zOjyhqIwavabLvM/edit?tab=t.0).

  **Phase**: Two Weeks Before
  **Ownership**: This task should be completed by the Product Manager.
