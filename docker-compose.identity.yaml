# Defines services needed to run the Identity Service app (on top of shared services already in docker-compose.yaml)
# Run via `docker compose -f docker-compose.yaml -f docker-compose.identity.yaml up`

services:
  identity_service:
    image: us-docker.pkg.dev/recidiviz-staging/appengine/default:latest
    volumes:
      - "./recidiviz:/app/recidiviz/"
      - "~/.config:/home/recidiviz/.config" # use user's credentials to access GCP APIs
    ports:
      - "5002:5000"
    command: uv run flask run -h 0.0.0.0
    environment:
      - FLASK_APP=/app/recidiviz/services/identity/server.py
      - FLASK_ENV=development
      - IS_DEV=true
      - GOOGLE_CLOUD_PROJECT=recidiviz-staging
